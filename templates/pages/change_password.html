{% extends 'base.html' %}
{% block title %}Changer le mot de passe{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{% url 'accounts:profile' %}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0">Changer le mot de passe</h4>
      </div>

      <div class="ip-card p-4">
        <form method="POST">
          {% csrf_token %}

          {% for field in form %}
          <div class="mb-3" x-data="{ show: false }">
            <label class="form-label fw-semibold small">{{ field.label }}</label>
            <div class="input-group">
              <input :type="show ? 'text' : 'password'"
                     name="{{ field.html_name }}"
                     class="form-control {% if field.errors %}is-invalid{% endif %}"
                     autocomplete="current-password" />
              <button type="button" class="btn btn-outline-secondary"
                      @click="show = !show" tabindex="-1">
                <i :class="show ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
            {% for error in field.errors %}
              <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}

          <button type="submit" class="btn btn-green w-100 mt-2">
            <i class="bi bi-lock-fill me-2"></i>Modifier le mot de passe
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
