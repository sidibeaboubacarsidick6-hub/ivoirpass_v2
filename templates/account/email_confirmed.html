{% extends 'base.html' %}
{% block title %}Email confirmé{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="ip-card p-5 text-center">

        <div style="width:80px; height:80px; border-radius:50%;
                    background:linear-gradient(135deg,#1B7A3E,#28a857);
                    display:flex; align-items:center; justify-content:center;
                    margin:0 auto 1.5rem; font-size:2.5rem;">
          ✅
        </div>

        <h4 class="fw-bold mb-2 text-green">Email confirmé !</h4>

        <p class="text-muted mb-4">
          Votre adresse email a été confirmée avec succès.
          Votre compte IvoirPass est maintenant actif.
        </p>

        <a href="{% url 'account_login' %}" class="btn btn-green btn-lg w-100 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>
          Se connecter
        </a>

        <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100">
          <i class="bi bi-house me-2"></i>
          Retour à l'accueil
        </a>

      </div>
    </div>
  </div>
</div>
{% endblock %}
