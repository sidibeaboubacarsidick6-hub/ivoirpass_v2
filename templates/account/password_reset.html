{% extends 'base.html' %}
{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="ip-card p-5">

        <div class="text-center mb-4">
          <div style="font-size:2.5rem; margin-bottom:0.5rem;">🔐</div>
          <h4 class="fw-bold mb-1">Mot de passe oublié ?</h4>
          <p class="text-muted small">
            Entrez votre adresse email. Vous recevrez un lien
            pour réinitialiser votre mot de passe.
          </p>
        </div>

        <form method="POST" action="{% url 'account_reset_password' %}">
          {% csrf_token %}

          <div class="mb-4">
            <label class="form-label fw-semibold small">
              <i class="bi bi-envelope me-1 text-green"></i>
              Adresse email
            </label>
            <input type="email" name="email"
                   class="form-control form-control-lg"
                   placeholder="vous@exemple.com"
                   required />
          </div>

          <button type="submit" class="btn btn-green btn-lg w-100 mb-3">
            <i class="bi bi-send me-2"></i>
            Envoyer le lien de réinitialisation
          </button>

          <div class="text-center">
            <a href="{% url 'account_login' %}" class="text-muted small">
              <i class="bi bi-arrow-left me-1"></i>
              Retour à la connexion
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
