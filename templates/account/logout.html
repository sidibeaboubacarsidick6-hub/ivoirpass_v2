{% extends 'base.html' %}
{% block title %}Déconnexion{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="ip-card p-5 text-center">
        <div style="font-size:3rem; margin-bottom:1rem;">👋</div>
        <h4 class="fw-bold mb-2">Déconnexion</h4>
        <p class="text-muted mb-4">
          Êtes-vous sûr de vouloir vous déconnecter ?
        </p>
        <form method="POST" action="{% url 'account_logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-5 me-2">
            <i class="bi bi-box-arrow-right me-1"></i>Oui, déconnecter
          </button>
        </form>
        <a href="/" class="btn btn-outline-secondary mt-3 d-block">
          Annuler
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
