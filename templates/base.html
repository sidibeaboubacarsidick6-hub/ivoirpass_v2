<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}IvoirPass — La plateforme ivoirienne de billetterie et de culture{% endblock %}" />

  <title>{% block title %}IvoirPass{% endblock %} | IvoirPass </title>

  {% load static %}
  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- IvoirPass CSS -->
  <link href="{% static 'css/ivoirpass.css' %}" rel="stylesheet" />

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  {% block extra_css %}{% endblock %}
</head>

<body>

  {% include 'partials/_navbar.html' %}
  {% include 'partials/_messages.html' %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/_footer.html' %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- IvoirPass JS -->
  <script src="{% static 'js/ivoirpass.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
