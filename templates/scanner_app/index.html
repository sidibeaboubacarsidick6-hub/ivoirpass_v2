<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>IvoirPass Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; }
        
        #loginScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 30px; background: linear-gradient(180deg, #0a0a0a 0%, #0f0f1a 100%); }
        #loginScreen .logo-container { margin-bottom: 30px; text-align: center; }
        #loginScreen .logo-icon { width: 90px; height: 90px; background: linear-gradient(135deg, #1B7A3E, #0a2a15); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; margin: 0 auto 15px; box-shadow: 0 15px 40px rgba(27,122,62,0.25); }
        #loginScreen h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
        #loginScreen .brand { color: #F47920; }
        #loginScreen .subtitle { font-size: 0.8rem; color: #666; margin-top: 5px; }
        
        #loginScreen .card { background: #111; border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; border: 1px solid #222; }
        #loginScreen .card .icon-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        #loginScreen .card .icon-row .mini-icon { width: 40px; height: 40px; background: rgba(244,121,32,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        #loginScreen .card .icon-row span { font-size: 0.9rem; font-weight: 600; color: #ccc; }
        #loginScreen .card input { width: 100%; padding: 16px; font-size: 1.3rem; text-align: center; border-radius: 14px; border: 2px solid #333; background: #0a0a0a; color: white; font-weight: 700; letter-spacing: 2px; outline: none; transition: 0.3s; }
        #loginScreen .card input:focus { border-color: #F47920; box-shadow: 0 0 0 4px rgba(244,121,32,0.1); }
        #loginScreen .card .hint { font-size: 0.7rem; color: #555; text-align: center; margin-top: 10px; }
        #loginScreen .card button { width: 100%; padding: 15px; font-size: 1rem; font-weight: 700; border: none; border-radius: 14px; background: #1B7A3E; color: white; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        #loginScreen .card button:active { transform: scale(0.97); background: #15632e; }
        #loginScreen .card .error { color: #dc3545; font-size: 0.75rem; text-align: center; margin-top: 8px; display: none; }

        #scanScreen { display: none; height: 100vh; position: relative; background: #000; }
        #scanScreen.active { display: block; }
        #reader { width: 100%; height: 100%; }
        
        .scan-header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .scan-header .event-badge { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 10px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
        .scan-header .event-badge span { color: #F47920; }
        .scan-header .close-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .scan-footer { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 15px 20px 25px; display: flex; gap: 10px; }
        .scan-footer .stat { flex: 1; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border-radius: 16px; padding: 14px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .scan-footer .stat .number { font-size: 1.8rem; font-weight: 800; }
        .scan-footer .stat .label { font-size: 0.65rem; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .scan-footer .stat.valid .number { color: #1B7A3E; }
        .scan-footer .stat.invalid .number { color: #dc3545; }

        .history-drawer { position: absolute; bottom: 120px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 20px; max-height: 30vh; overflow-y: auto; display: none; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .history-drawer.show { display: block; }
        .history-drawer .item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 4px; }
        .history-drawer .item.valid { background: rgba(27,122,62,0.2); }
        .history-drawer .item.invalid { background: rgba(220,53,69,0.2); }
        .history-toggle { position: absolute; bottom: 120px; right: 15px; z-index: 11; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .result-overlay { position: fixed; inset: 0; z-index: 100; display: none; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.92); }
        .result-overlay.show { display: flex; animation: fadeIn 0.15s; }
        .result-overlay .circle { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 20px; }
        .result-overlay.valid .circle { background: #1B7A3E; box-shadow: 0 0 80px rgba(27,122,62,0.5); }
        .result-overlay.invalid .circle { background: #dc3545; box-shadow: 0 0 80px rgba(220,53,69,0.5); }
        .result-overlay .message { font-size: 1.8rem; font-weight: 800; text-align: center; }
        .result-overlay .detail { font-size: 0.9rem; color: #aaa; margin-top: 8px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="logo-container">
            <div class="logo-icon">🎫</div>
            <h1>Ivoir<span class="brand">Pass</span></h1>
            <p class="subtitle">Scanner de billets</p>
        </div>

        <div class="card">
            <div class="icon-row">
                <div class="mini-icon">🎯</div>
                <span>ID de l'événement</span>
            </div>
            <input type="number" id="eventIdInput" placeholder="Ex: 5" autofocus>
            <p class="hint">Communiqué par l'organisateur</p>
            <p class="error" id="errorMsg">Veuillez entrer un ID valide</p>
            <button onclick="startScan()">🚀 Démarrer le scan</button>
        </div>
    </div>

    <!-- SCAN -->
    <div id="scanScreen">
        <div id="reader"></div>
        
        <div class="scan-header">
            <div class="event-badge">🎫 Événement #<span id="eventIdDisplay"></span></div>
            <button class="close-btn" onclick="stopScan()">✕</button>
        </div>

        <button class="history-toggle" onclick="toggleHistory()">📋</button>
        <div class="history-drawer" id="historyDrawer"></div>

        <div class="scan-footer">
            <div class="stat valid"><div class="number" id="validCount">0</div><div class="label">Valides</div></div>
            <div class="stat invalid"><div class="number" id="invalidCount">0</div><div class="label">Refusés</div></div>
        </div>
    </div>

    <!-- RÉSULTAT -->
    <div id="resultOverlay" class="result-overlay">
        <div class="circle"></div>
        <div class="message"></div>
        <div class="detail"></div>
    </div>

    <script>
        const SCAN_URL = '/api/scanner/scan/';
        let html5QrCode, eventId, validCount=0, invalidCount=0, scanning=false, history=[];

        document.getElementById('eventIdInput').addEventListener('keydown', e => { if(e.key==='Enter') startScan(); });

        function startScan() {
            eventId = parseInt(document.getElementById('eventIdInput').value);
            if(!eventId||eventId<1) { document.getElementById('errorMsg').style.display='block'; return; }
            document.getElementById('errorMsg').style.display='none';
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('scanScreen').classList.add('active');
            document.getElementById('eventIdDisplay').textContent=eventId;
            html5QrCode=new Html5Qrcode("reader",{formatsToSupport:[0]});
            html5QrCode.start({facingMode:"environment"},{fps:15,qrbox:{width:250,height:250},aspectRatio:1},onScan,()=>{})
            .then(()=>{scanning=true}).catch(e=>{alert('Caméra: '+e.message);stopScan();});
        }

        function stopScan() {
            scanning=false;
            if(html5QrCode){html5QrCode.stop().catch(()=>{});html5QrCode=null;}
            document.getElementById('scanScreen').classList.remove('active');
            document.getElementById('loginScreen').style.display='flex';
            document.getElementById('eventIdInput').value=''; document.getElementById('eventIdInput').focus();
            validCount=0;invalidCount=0;history=[];
            updateCounters(); updateHistory();
        }

        function onScan(decodedText) {
            if(!scanning)return; scanning=false;
            fetch(SCAN_URL,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},body:JSON.stringify({qr_data:decodedText,event_id:eventId})})
            .then(r=>r.json()).then(data=>{
                showResult(data);
                data.result==='valid'?validCount++:invalidCount++;
                updateCounters();
                history.unshift({time:new Date().toLocaleTimeString().slice(0,5),result:data.result,msg:data.message.substring(0,25)});
                if(history.length>30) history.pop();
                updateHistory();
                setTimeout(()=>{hideResult();scanning=true;},1500);
            }).catch(()=>{
                showResult({result:'error',message:'Erreur réseau',color:'red'});
                invalidCount++;updateCounters();
                history.unshift({time:new Date().toLocaleTimeString().slice(0,5),result:'error',msg:'Erreur réseau'});
                updateHistory();
                setTimeout(()=>{hideResult();scanning=true;},1500);
            });
        }

        function getCSRF() {
            const match = document.cookie.match(/csrftoken=([\w]+)/);
            return match ? match[1] : '';
        }

        function showResult(d) {
            const o=document.getElementById('resultOverlay');
            o.className='result-overlay show '+(d.color==='green'?'valid':'invalid');
            o.querySelector('.circle').textContent=d.color==='green'?'✅':'❌';
            o.querySelector('.message').textContent=d.color==='green'?'ACCÈS AUTORISÉ':'ACCÈS REFUSÉ';
            o.querySelector('.detail').textContent=d.message;
            if(navigator.vibrate)navigator.vibrate(d.color==='green'?[100,50,200]:500);
        }
        function hideResult(){document.getElementById('resultOverlay').classList.remove('show');}
        function updateCounters(){document.getElementById('validCount').textContent=validCount;document.getElementById('invalidCount').textContent=invalidCount;}
        function updateHistory(){document.getElementById('historyDrawer').innerHTML=history.map(h=>`<div class="item ${h.result==='valid'?'valid':'invalid'}">${h.result==='valid'?'✅':'❌'} ${h.time} — ${h.msg}</div>`).join('');}
        function toggleHistory(){document.getElementById('historyDrawer').classList.toggle('show');}
    </script>
</body>
</html>
