<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>IvoirPass Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; }
        .screen.active { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; background: linear-gradient(180deg, #0a0a0a 0%, #0f0f1a 100%); }
        .logo-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #1B7A3E, #0a2a15); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 20px; box-shadow: 0 15px 40px rgba(27,122,62,0.25); }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        h1 span { color: #F47920; }
        .subtitle { font-size: 0.8rem; color: #666; margin-bottom: 25px; }
        .card { background: #111; border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; border: 1px solid #222; }
        .field { margin-bottom: 14px; }
        label { display: block; font-size: 0.7rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px; border: 2px solid #333; background: #0a0a0a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #F47920; box-shadow: 0 0 0 4px rgba(244,121,32,0.1); }
        button { width: 100%; padding: 15px; font-size: 1rem; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .btn-green { background: #1B7A3E; color: white; }
        .btn-green:active { transform: scale(0.97); background: #15632e; }
        .btn-gray { background: #333; color: white; margin-top: 8px; }
        .error-msg { color: #dc3545; font-size: 0.75rem; text-align: center; margin-top: 10px; display: none; }

        #scanScreen { display: none; height: 100vh; position: relative; background: #000; }
        #scanScreen.active { display: block; }
        #reader { width: 100%; height: 100%; }
        .scan-header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .event-badge { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 8px 16px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
        .event-badge span { color: #F47920; }
        .close-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .scan-footer { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 12px 16px 20px; display: flex; gap: 8px; }
        .stat { flex: 1; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border-radius: 14px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat .number { font-size: 1.6rem; font-weight: 800; }
        .stat .label { font-size: 0.6rem; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .stat.valid .number { color: #1B7A3E; }
        .stat.invalid .number { color: #dc3545; }
        .history-drawer { position: absolute; bottom: 110px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 18px; max-height: 30vh; overflow-y: auto; display: none; padding: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .history-drawer.show { display: block; }
        .history-drawer .item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; font-size: 0.7rem; margin-bottom: 3px; }
        .history-drawer .item.valid { background: rgba(27,122,62,0.2); }
        .history-drawer .item.invalid { background: rgba(220,53,69,0.2); }
        .history-toggle { position: absolute; bottom: 115px; right: 15px; z-index: 11; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .result-overlay { position: fixed; inset: 0; z-index: 100; display: none; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.92); }
        .result-overlay.show { display: flex; animation: fadeIn 0.15s; }
        .result-overlay .circle { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin-bottom: 18px; }
        .result-overlay.valid .circle { background: #1B7A3E; box-shadow: 0 0 70px rgba(27,122,62,0.5); }
        .result-overlay.invalid .circle { background: #dc3545; box-shadow: 0 0 70px rgba(220,53,69,0.5); }
        .result-overlay .message { font-size: 1.6rem; font-weight: 800; text-align: center; }
        .result-overlay .detail { font-size: 0.85rem; color: #aaa; margin-top: 6px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="logo-icon">🎫</div>
        <h1>Ivoir<span>Pass</span></h1>
        <p class="subtitle">Scanner agent</p>
        <div class="card">
            <div class="field"><label>📧 Email</label><input type="email" id="emailInput" placeholder="agent@evenement.com" autofocus></div>
            <div class="field"><label>🔒 Mot de passe</label><input type="password" id="passwordInput" placeholder="••••••••"></div>
            <p class="error-msg" id="loginError">Email ou mot de passe incorrect</p>
            <button onclick="doLogin()" class="btn-green">🔐 Connexion</button>
        </div>
    </div>

    <div id="eventScreen" class="screen">
        <div class="logo-icon">🎯</div>
        <h1 style="margin-bottom:5px;">Événement</h1>
        <p class="subtitle" style="margin-bottom:20px;">Connecté : <strong id="agentName" style="color:#F47920;"></strong></p>
        <div class="card">
            <div class="field"><label>🎫 ID de l'événement</label><input type="number" id="eventIdInput" placeholder="Ex: 5" autofocus></div>
            <p class="error-msg" id="eventError">ID invalide</p>
            <button onclick="startScan()" class="btn-green">🚀 Démarrer le scan</button>
            <button onclick="doLogout()" class="btn-gray">🚪 Déconnexion</button>
        </div>
    </div>

    <div id="scanScreen">
        <div id="reader"></div>
        <div class="scan-header">
            <div class="event-badge">🎫 #<span id="eventIdDisplay"></span></div>
            <button class="close-btn" onclick="stopScan()">✕</button>
        </div>
        <button class="history-toggle" onclick="toggleHistory()">📋</button>
        <div class="history-drawer" id="historyDrawer"></div>
        <div class="scan-footer">
            <div class="stat valid"><div class="number" id="validCount">0</div><div class="label">Valides</div></div>
            <div class="stat invalid"><div class="number" id="invalidCount">0</div><div class="label">Refusés</div></div>
        </div>
    </div>

    <div id="resultOverlay" class="result-overlay">
        <div class="circle"></div>
        <div class="message"></div>
        <div class="detail"></div>
    </div>

    <script>
        const LOGIN_URL = '/accounts/login/';
        const LOGOUT_URL = '/accounts/logout/';
        const SCAN_URL = '/api/scanner/scan/';
        const API_KEY = 'ivoirpass-scanner-2026';
        let html5QrCode, eventId, validCount=0, invalidCount=0, scanning=false, history=[];

        document.getElementById('passwordInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
        document.getElementById('eventIdInput').addEventListener('keydown', e => { if(e.key==='Enter') startScan(); });

        function getCSRF() {
            const match = document.cookie.match(/csrftoken=([\w]+)/);
            return match ? match[1] : '';
        }

        async function doLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            if(!email||!password){document.getElementById('loginError').style.display='block';return;}

            const formData = new FormData();
            formData.append('login', email);
            formData.append('password', password);
            formData.append('csrfmiddlewaretoken', getCSRF());

            try {
                const res = await fetch(LOGIN_URL, { method: 'POST', body: formData, redirect: 'follow' });
                if (res.url && !res.url.includes('/login')) {
                    document.getElementById('loginScreen').classList.remove('active');
                    document.getElementById('eventScreen').classList.add('active');
                    document.getElementById('agentName').textContent = email;
                    document.getElementById('eventIdInput').focus();
                    document.getElementById('loginError').style.display = 'none';
                    document.getElementById('passwordInput').value = '';
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch(e) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function doLogout() {
            await fetch(LOGOUT_URL, { method: 'POST', headers: { 'X-CSRFToken': getCSRF() } });
            document.getElementById('eventScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
            document.getElementById('emailInput').focus();
        }

        async function startScan() {
            eventId = parseInt(document.getElementById('eventIdInput').value);
            if(!eventId||eventId<1){document.getElementById('eventError').textContent='ID invalide';document.getElementById('eventError').style.display='block';return;}

            // Vérifier que l'événement existe avant d'ouvrir la caméra
            try {
                const checkRes = await fetch(SCAN_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ qr_data: 'check:event:exists:only', event_id: eventId })
                });
                const checkData = await checkRes.json();
                if (checkData.result === 'wrong_event' && checkData.message === 'Événement introuvable') {
                    document.getElementById('eventError').textContent = 'Cet événement n\'existe pas';
                    document.getElementById('eventError').style.display = 'block';
                    return;
                }
            } catch(e) {
                document.getElementById('eventError').textContent = 'Erreur de connexion';
                document.getElementById('eventError').style.display = 'block';
                return;
            }

            document.getElementById('eventError').style.display='none';
            document.getElementById('eventScreen').classList.remove('active');
            document.getElementById('scanScreen').classList.add('active');
            document.getElementById('eventIdDisplay').textContent=eventId;

            html5QrCode=new Html5Qrcode("reader",{formatsToSupport:[0]});
            html5QrCode.start({facingMode:"environment"},{fps:15,qrbox:{width:250,height:250},aspectRatio:1},onScan,()=>{})
            .then(()=>{scanning=true}).catch(e=>{alert('Caméra: '+e.message);stopScan();});
        }

        function stopScan() {
            scanning=false;
            if(html5QrCode){html5QrCode.stop().catch(()=>{});html5QrCode=null;}
            document.getElementById('scanScreen').classList.remove('active');
            document.getElementById('eventScreen').classList.add('active');
            document.getElementById('eventIdInput').value='';document.getElementById('eventIdInput').focus();
            validCount=0;invalidCount=0;history=[];
            updateCounters();updateHistory();
        }

        function onScan(decodedText) {
            if(!scanning)return;scanning=false;
            fetch(SCAN_URL,{
                method:'POST',
                headers:{'Content-Type':'application/json','X-API-Key':API_KEY},
                body:JSON.stringify({qr_data:decodedText,event_id:eventId})
            })
            .then(r=>r.json()).then(data=>{
                if(data.result==='unauthorized'){alert('Session expirée. Reconnectez-vous.');stopScan();return;}
                showResult(data);
                data.result==='valid'?validCount++:invalidCount++;
                updateCounters();
                history.unshift({time:new Date().toLocaleTimeString().slice(0,5),result:data.result,msg:data.message.substring(0,30)});
                if(history.length>30)history.pop();
                updateHistory();
                setTimeout(()=>{hideResult();scanning=true;},1500);
            }).catch(()=>{
                showResult({result:'error',message:'Erreur réseau',color:'red'});
                invalidCount++;updateCounters();
                history.unshift({time:new Date().toLocaleTimeString().slice(0,5),result:'error',msg:'Erreur réseau'});
                updateHistory();
                setTimeout(()=>{hideResult();scanning=true;},1500);
            });
        }

        function showResult(d){
            const o=document.getElementById('resultOverlay');
            o.className='result-overlay show '+(d.color==='green'?'valid':'invalid');
            o.querySelector('.circle').textContent=d.color==='green'?'✅':'❌';
            o.querySelector('.message').textContent=d.color==='green'?'ACCÈS AUTORISÉ':'ACCÈS REFUSÉ';
            o.querySelector('.detail').textContent=d.message;
            if(navigator.vibrate)navigator.vibrate(d.color==='green'?[100,50,200]:500);
        }
        function hideResult(){document.getElementById('resultOverlay').classList.remove('show');}
        function updateCounters(){document.getElementById('validCount').textContent=validCount;document.getElementById('invalidCount').textContent=invalidCount;}
        function updateHistory(){document.getElementById('historyDrawer').innerHTML=history.map(h=>`<div class="item ${h.result==='valid'?'valid':'invalid'}">${h.result==='valid'?'✅':'❌'} ${h.time} — ${h.msg}</div>`).join('');}
        function toggleHistory(){document.getElementById('historyDrawer').classList.toggle('show');}

        async function checkSession() {
            try {
                const res = await fetch('/dashboard/');
                if (res.ok && !res.url.includes('/login')) {
                    document.getElementById('loginScreen').classList.remove('active');
                    document.getElementById('eventScreen').classList.add('active');
                    document.getElementById('eventIdInput').focus();
                }
            } catch(e) {}
        }
        checkSession();
    </script>
</body>
</html>
