version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ivoirpass_v2_db
      POSTGRES_USER: ivoirpass_v2_user
      POSTGRES_PASSWORD: ivoirpass_password_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivoirpass_v2_user -d ivoirpass_v2_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Sans ce service, les tâches planifiées (vérification des reversements
  # en attente 3x/jour, rapport BCEAO mensuel — voir CELERY_BEAT_SCHEDULE
  # dans config/settings/base.py) ne se déclenchent JAMAIS, même si le
  # worker "celery" ci-dessus tourne parfaitement. Le worker exécute les
  # tâches ; celery beat est celui qui décide QUAND les déclencher.
  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: